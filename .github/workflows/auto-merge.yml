name: Auto Merge (COWORK test mode)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  auto-approve-merge:
    name: Auto Approve and Merge (COWORK test mode)
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get PR number
        id: get-pr
        run: |
          PR=$(gh pr list --head "${{ github.event.workflow_run.head_branch }}" \
            --state open --json number --jq '.[0].number // empty')
          echo "pr_number=$PR" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip if no open PR
        if: steps.get-pr.outputs.pr_number == ''
        run: echo "No open PR found for this branch – skipping."

      - name: Approve PR
        if: steps.get-pr.outputs.pr_number != ''
        run: |
          gh pr review "${{ steps.get-pr.outputs.pr_number }}" --approve \
            --body "COWORK自律テスト: CI通過を確認。自動承認します。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        if: steps.get-pr.outputs.pr_number != ''
        run: |
          gh pr merge "${{ steps.get-pr.outputs.pr_number }}" \
            --merge --delete-branch \
            --subject "chore: auto-merge PR #${{ steps.get-pr.outputs.pr_number }} (COWORK test mode)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
