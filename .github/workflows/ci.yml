name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: TypeScript Check + Build + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn typecheck
      - run: yarn build
      - run: yarn test
